<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Scrap Photobooth</title>

<style>
body {
  margin:0;
  display:flex;
  justify-content:center;
  background:#000;
}

.story {
  position:relative;
  width:100vw;
  max-width:430px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#fff;
}

.story img.bg {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

video {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
}

.countdown {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  color:white;
  font-weight:bold;
  z-index:5;
}

.controls {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:10;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="story">
  <img src="Scrap.jpg" class="bg" id="bg" />
  <video id="video" autoplay playsinline></video>
  <div class="countdown" id="countdown"></div>

  <div class="controls">
    <button onclick="startCapture()">Start</button>
    <button onclick="flipCamera()">Flip</button>
    <button onclick="exportImage()">Export JPG</button>
  </div>
</div>

<script>
let video = document.getElementById("video");
let countdownEl = document.getElementById("countdown");
let facingMode = "user";
let stream;
let shots = [];
let totalShots = 20;

async function startCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: facingMode }
  });

  video.srcObject = stream;
}

function flipCamera(){
  facingMode = facingMode === "user" ? "environment" : "user";
  startCamera();
}

async function startCapture(){
  shots = [];
  await startCamera();
  captureLoop(0);
}

function captureLoop(i){
  if(i >= totalShots){
    video.style.display = "none";
    return;
  }

  startCountdown(3, ()=>{
    capturePhoto();
    setTimeout(()=>captureLoop(i+1),500);
  });
}

function startCountdown(num, callback){
  countdownEl.innerText = num;
  let interval = setInterval(()=>{
    num--;
    if(num <=0){
      clearInterval(interval);
      countdownEl.innerText="";
      callback();
    } else {
      countdownEl.innerText = num;
    }
  },1000);
}

function capturePhoto(){
  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  let ctx = canvas.getContext("2d");

  if(facingMode === "user"){
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
  }

  ctx.drawImage(video,0,0);
  shots.push(canvas);
}

function exportImage(){
  if(shots.length !== totalShots){
    alert("ถ่ายให้ครบ 20 รูปก่อนนะคะ");
    return;
  }

  let finalCanvas = document.createElement("canvas");
  finalCanvas.width = 1080;
  finalCanvas.height = 1920;
  let ctx = finalCanvas.getContext("2d");

  let bg = document.getElementById("bg");
  ctx.drawImage(bg,0,0,1080,1920);

  let cols = 4;
  let rows = 5;
  let imgW = 200;
  let imgH = 300;
  let startX = 100;
  let startY = 300;
  let gapX = 200;
  let gapY = 300;

  let index = 0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      let x = startX + c*gapX;
      let y = startY + r*gapY;
      ctx.drawImage(shots[index], x, y, imgW, imgH);
      index++;
    }
  }

  let link = document.createElement("a");
  link.download = "myscrap.jpg";
  link.href = finalCanvas.toDataURL("image/jpeg",1.0);
  link.click();
}

startCamera();
</script>

</body>
</html>
