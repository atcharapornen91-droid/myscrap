<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  background:#000;
}

.story{
  position:relative;
  width:100vw;
  max-width:430px;
  aspect-ratio:9/16;
  overflow:hidden;
}

.bg{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  z-index:1;
}

video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
}

.frame{
  position:absolute;
  width:18%;
  aspect-ratio:3/4;
  overflow:hidden;
  z-index:3;
}

.frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  position:absolute;
  bottom:15px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:10;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:20px;
}
</style>
</head>
<body>

<div class="story">

  <img src="Scrap.jpg" class="bg">

  <video id="video" autoplay playsinline></video>

  <!-- สร้าง 20 ช่อง -->
  <div id="frames"></div>

  <div class="controls">
    <button onclick="capture()">📸</button>
    <button onclick="flip()">Flip</button>
    <button onclick="exportImg()">Export</button>
  </div>
</div>

<script>
let video = document.getElementById("video");
let framesContainer = document.getElementById("frames");
let facing = "user";
let stream;
let currentIndex = 0;
let total = 20;

async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:facing }
  });

  video.srcObject = stream;
}

function flip(){
  facing = facing === "user" ? "environment" : "user";
  startCamera();
}

startCamera();

/* === วางตำแหน่งเฟรมแบบ grid 4x5 ให้ตรงกับภาพ === */

let cols = 4;
let rows = 5;

for(let r=0;r<rows;r++){
  for(let c=0;c<cols;c++){
    let f = document.createElement("div");
    f.className="frame";

    f.style.left = (8 + c*22) + "%";
    f.style.top  = (18 + r*15) + "%";

    framesContainer.appendChild(f);
  }
}

function capture(){
  if(currentIndex >= total) return;

  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  let ctx = canvas.getContext("2d");

  if(facing === "user"){
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
  }

  ctx.drawImage(video,0,0);

  let img = document.createElement("img");
  img.src = canvas.toDataURL("image/jpeg");

  framesContainer.children[currentIndex].appendChild(img);
  currentIndex++;
}

function exportImg(){
  if(currentIndex < total){
    alert("ยังไม่ครบ 20 รูป");
    return;
  }

  html2canvas(document.querySelector(".story")).then(canvas=>{
    let link = document.createElement("a");
    link.download="myscrap.jpg";
    link.href = canvas.toDataURL("image/jpeg",1.0);
    link.click();
  });
}
</script>

<!-- โหลด html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
