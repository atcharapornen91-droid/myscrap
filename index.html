<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<style>

body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.story{
  position:relative;
  width:100vw;
  max-width:430px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#fff;
  border-radius:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
}

.frame{
  position:absolute;
  width:18.2%;
  height:11.6%;
  overflow:hidden;
  z-index:3;
}

.frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:14px;
  z-index:10;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:999px;
  font-size:14px;
  background:white;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

button:active{
  transform:scale(0.95);
}

</style>
</head>
<body>

<div class="story">

  <img src="Scrap.jpg" class="bg">

  <video id="video" autoplay playsinline></video>

  <div id="frames"></div>

  <div class="controls">
    <button id="captureBtn">📸</button>
    <button id="flipBtn">Flip</button>
    <button id="exportBtn">Export</button>
  </div>

</div>

<script>
let video = document.getElementById("video");
let framesContainer = document.getElementById("frames");
let captureBtn = document.getElementById("captureBtn");
let flipBtn = document.getElementById("flipBtn");
let exportBtn = document.getElementById("exportBtn");

let facing = "user";
let stream = null;
let currentIndex = 0;
const total = 20;

async function startCamera(){
  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:facing }
  });

  video.srcObject = stream;
}

flipBtn.onclick = () => {
  facing = facing === "user" ? "environment" : "user";
  startCamera();
};

captureBtn.onclick = () => {
  if(currentIndex >= total) return;

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");

  if(facing === "user"){
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
  }

  ctx.drawImage(video,0,0);

  const img = document.createElement("img");
  img.src = canvas.toDataURL("image/jpeg");

  framesContainer.children[currentIndex].appendChild(img);
  currentIndex++;
};

exportBtn.onclick = async () => {
  if(currentIndex < total){
    alert("ถ่ายให้ครบ 20 รูปก่อนนะคะ 💛");
    return;
  }

  const canvas = await html2canvas(document.querySelector(".story"));
  const link = document.createElement("a");
  link.download = "myscrap.jpg";
  link.href = canvas.toDataURL("image/jpeg",1.0);
  link.click();
};

startCamera();

/* ==== ตำแหน่งที่วัดจากภาพจริง ==== */

const cols = 4;
const rows = 5;

const startX = 8.2;   // %
const startY = 19.5;  // %
const gapX = 22.2;    // %
const gapY = 14.8;    // %

for(let r=0;r<rows;r++){
  for(let c=0;c<cols;c++){
    const f = document.createElement("div");
    f.className="frame";
    f.style.left = (startX + c*gapX) + "%";
    f.style.top  = (startY + r*gapY) + "%";
    framesContainer.appendChild(f);
  }
}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
